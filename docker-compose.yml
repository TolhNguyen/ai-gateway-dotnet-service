services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-gateway-postgres
    environment:
      POSTGRES_DB: ai_gateway
      POSTGRES_USER: ai_gateway
      POSTGRES_PASSWORD: ai_gateway
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_gateway -d ai_gateway"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: ai-gateway-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  ai-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-gateway-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
        ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
        ConnectionStrings__Postgres: ${POSTGRES_CONNECTION_STRING}
        Redis__ConnectionString: ${REDIS_CONNECTION_STRING}
        AiGateway__RequireClientAuth: ${AI_GATEWAY_REQUIRE_CLIENT_AUTH}
        AiGateway__EncryptionKeyBase64: ${AI_GATEWAY_ENCRYPTION_KEY_BASE64}
        AiGateway__MetricFlushSeconds: ${AI_GATEWAY_METRIC_FLUSH_SECONDS}
        AiGateway__ErrorEventsRetentionDays: ${AI_GATEWAY_ERROR_EVENTS_RETENTION_DAYS}
        AiGateway__ConfigCacheSeconds: ${AI_GATEWAY_CONFIG_CACHE_SECONDS}
        AiGateway__ErrorEventsMaxPerAccountTypeHour: ${AI_GATEWAY_ERROR_EVENTS_MAX_PER_ACCOUNT_TYPE_HOUR}
        AiGateway__DefaultReservedOutputTokens: ${AI_GATEWAY_DEFAULT_RESERVED_OUTPUT_TOKENS}
        AiGateway__ExposeRoutingWhenDebug: ${AI_GATEWAY_EXPOSE_ROUTING_WHEN_DEBUG}
        AdminAuth__Enabled: ${ADMIN_AUTH_ENABLED}
        AdminAuth__ApiKeyHash: ${ADMIN_AUTH_API_KEY_HASH}
        AdminAuth__AllowInDevelopmentWithoutKey: ${ADMIN_AUTH_ALLOW_IN_DEVELOPMENT_WITHOUT_KEY}
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  redis_data:
