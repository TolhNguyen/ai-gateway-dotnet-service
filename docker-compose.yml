# Optional docker-compose wrapper.
# All you really need is:
#   docker build -t aigateway:latest .
#   docker run -d -p 8080:8080 -v aigateway-data:/var/lib/postgresql/data aigateway:latest
#
# Compose is just a nicer way to manage volumes and restart policy.

services:
  aigateway:
    build: .
    image: aigateway:latest
    container_name: aigateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # All app-level config has sensible defaults baked in.
      # Override anything here if you need to.
      AiGateway__BootstrapAdminEmail: "admin@aigateway.local"
      AiGateway__BootstrapAdminPassword: "admin@2026"
    volumes:
      - aigateway-pg:/var/lib/postgresql/data
      - aigateway-redis:/var/lib/redis

volumes:
  aigateway-pg:
  aigateway-redis:
