# Glob patterns of files AI agents must NEVER modify.
# The MCP server filters these out of the modification surface it advertises
# to agents. The CI gate double-checks the PR diff.

do_not_touch:
  # ─── Applied database migrations ──────────────────────────────────────
  # Applied SQL is immutable. MigrationRunner records a SHA-256 checksum
  # per file in __schema_migrations; a mismatch logs a loud warning. New
  # schema changes MUST go in a new file (e.g. 003_*.sql), never an edit
  # to an existing migration.
  - migrations/**

  # ─── Lua-scripted rate limit + quota engine ───────────────────────────
  # The Lua scripts here carry production bug fixes that the v1 audit
  # surfaced: token-usage adjustment after key expiry (with KEEPTTL +
  # clamp-at-zero), inflight DECR with EXISTS guard. Edits regress
  # production behavior in ways that won't appear in dev. New rate-limit
  # features go in a new file with a new method, not edits to this one.
  - src/AiGateway.Api/Infrastructure/Redis/RedisRateLimitStore.cs

  # ─── AES-256-GCM provider key crypto ──────────────────────────────────
  # The on-disk ciphertext format is: 12-byte nonce ‖ 16-byte tag ‖
  # ciphertext, base64. Every encrypted user API key in the database
  # decodes against this format. Any change to byte ordering, tag length,
  # AAD, or algorithm breaks decryption of every existing key in every
  # tenant — silently — until a request actually tries to use one.
  # New crypto algorithms require a separate ApiKeyEncV2 column and a
  # migration that converts at read time, not edits to this file.
  - src/AiGateway.Api/Infrastructure/Security/AesGcmSecretProtector.cs

  # ─── ISecretProtector interface ───────────────────────────────────────
  # The Protect/Unprotect contract is depended on by every encrypted-at-
  # rest column in the database. Renaming methods, changing parameter
  # types, or changing the return semantics breaks every consumer at
  # once and is not the kind of refactor an AI agent should propose.
  - src/AiGateway.Api/Infrastructure/Security/SecretProtector.cs

  # ─── Generated bytecode and build outputs ─────────────────────────────
  - "**/bin/**"
  - "**/obj/**"
