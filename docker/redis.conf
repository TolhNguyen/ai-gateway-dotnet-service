bind 127.0.0.1
port 6379
protected-mode yes

dir /var/lib/redis
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

maxmemory 256mb
maxmemory-policy allkeys-lru

# Reduce log noise inside container
loglevel notice
logfile ""

# Disable RDB to keep things simple (AOF only)
save ""

# Slow log
slowlog-log-slower-than 50000
slowlog-max-len 128

tcp-keepalive 60
timeout 0
